name: smart_exam_app
description: Smart Exam Invigilation System - Flutter Client
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.0

  # State Management & Networking
  provider: ^6.0.5
  http: ^1.2.2
  dio: ^5.3.1
  web_socket_channel: ^2.4.0

  # Routing
  go_router: ^17.1.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # Device Info & Permissions
  device_info_plus: ^12.3.0
  permission_handler: ^12.0.1

  # Camera & Media
  camera: ^0.11.3+1
  image: ^4.1.1

  # Invigilation Features
  flutter_foreground_task: ^9.2.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.1.0
  google_mlkit_face_detection: ^0.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  assets:
    - assets/logo/siesaura.png
  uses-material-design: true


flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/siesaura.png"
  adaptive_icon_background: "assets/logo/siesaura.png"
  adaptive_icon_foreground: "assets/logo/siesaura.png"